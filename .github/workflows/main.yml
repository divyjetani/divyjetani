name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # IMPORTANT (fixes push issues)

    steps:
      - uses: actions/checkout@v4   # UPDATED

      - uses: Platane/snk@v3
        with:
          github_user_name: divyjetani
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push Snake
        uses: peaceiris/actions-gh-pages@v4   # REPLACED (modern)
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
